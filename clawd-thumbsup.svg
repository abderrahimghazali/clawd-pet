<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .thu-body { transform-origin: 7.5px 15px; animation: thu-nod 1.5s infinite ease-in-out; }
      .thu-shadow { animation: thu-s 1.5s infinite; }
      .thu-eyes { transform-origin: 7.5px 9px; animation: thu-blink 3s infinite; }
      .thu-thumb { animation: thu-bob 1.5s infinite ease-in-out; }
      @keyframes thu-nod { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes thu-s { 0%, 100% { opacity: 0.5; } }
      @keyframes thu-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes thu-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
    </style>
  </defs>
  <rect class="thu-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="thu-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <!-- Thumbs up hand -->
    <g class="thu-thumb" fill="#DE886D">
      <rect x="13" y="8" width="2" height="3"/>
      <rect x="14" y="5" width="2" height="3"/>
    </g>
    <g class="thu-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
