<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -2 20 22" width="500" height="500">
  <defs>
    <style>
      .load-body {
        transform-origin: 7.5px 15px;
        animation: load-spin 2s infinite linear;
      }
      .load-shadow {
        transform-origin: 7.5px 15.5px;
        animation: load-shadow 2s infinite linear;
      }
      .orb1 { animation: orb-orbit 1.5s infinite linear; }
      .orb2 { animation: orb-orbit 1.5s infinite linear 0.5s; }
      .orb3 { animation: orb-orbit 1.5s infinite linear 1s; }
      @keyframes load-spin {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(5deg); }
        50% { transform: rotate(0deg); }
        75% { transform: rotate(-5deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes load-shadow {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(0.9); opacity: 0.4; }
      }
      @keyframes orb-orbit {
        0% { opacity: 1; transform: scale(1); }
        33% { opacity: 0.5; transform: scale(0.6); }
        66% { opacity: 0.3; transform: scale(0.4); }
        100% { opacity: 1; transform: scale(1); }
      }
    </style>
  </defs>
  <rect class="load-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Orbiting dots above head -->
  <g>
    <rect class="orb1" x="4" y="1" width="2" height="2" rx="0.5" fill="#0082FC"/>
    <rect class="orb2" x="8" y="0" width="2" height="2" rx="0.5" fill="#0082FC"/>
    <rect class="orb3" x="12" y="1" width="2" height="2" rx="0.5" fill="#0082FC"/>
  </g>
  <g class="load-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Waiting eyes (looking up at dots) -->
    <g fill="#000">
      <rect x="5" y="7" width="1" height="2"/>
      <rect x="11" y="7" width="1" height="2"/>
    </g>
    <!-- Small mouth -->
    <g fill="#000">
      <rect x="7" y="11" width="1" height="1"/>
    </g>
  </g>
</svg>
