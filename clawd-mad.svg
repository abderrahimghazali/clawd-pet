<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 22" width="120" height="147">
  <defs>
    <style>
      .mad-body {
        transform-origin: 7.5px 19px;
        animation: mad-shake 0.15s infinite alternate ease-in-out;
      }
      .mad-shadow {
        animation: shadow-stable 0.15s infinite alternate;
      }
      .steam1 { animation: steam-rise 1s infinite ease-out; }
      .steam2 { animation: steam-rise 1s infinite ease-out 0.5s; }
      .fist-left {
        transform-origin: 1px 12px;
        animation: fist-shake-l 0.3s infinite alternate ease-in-out;
      }
      .fist-right {
        transform-origin: 14px 12px;
        animation: fist-shake-r 0.3s infinite alternate ease-in-out;
      }
      @keyframes mad-shake {
        0% { transform: translateX(-0.5px); }
        100% { transform: translateX(0.5px); }
      }
      @keyframes shadow-stable {
        0%, 100% { opacity: 0.5; }
      }
      @keyframes steam-rise {
        0% { opacity: 0.8; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-4px); }
      }
      @keyframes fist-shake-l {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-20deg); }
      }
      @keyframes fist-shake-r {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(20deg); }
      }
    </style>
  </defs>
  <!-- Shadow -->
  <rect class="mad-shadow" x="3" y="19" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Steam -->
  <g fill="#FF4444" opacity="0.7">
    <rect class="steam1" x="3" y="4" width="1" height="2"/>
    <rect class="steam1" x="4" y="3" width="1" height="1"/>
    <rect class="steam2" x="12" y="4" width="1" height="2"/>
    <rect class="steam2" x="11" y="3" width="1" height="1"/>
  </g>
  <!-- Body -->
  <g class="mad-body">
    <g fill="#DE886D">
      <!-- Legs (stomping stance) -->
      <rect x="3" y="17" width="1" height="2"/>
      <rect x="5" y="17" width="1" height="2"/>
      <rect x="9" y="17" width="1" height="2"/>
      <rect x="11" y="17" width="1" height="2"/>
      <!-- Torso -->
      <rect x="2" y="8" width="11" height="9"/>
      <!-- Fists raised -->
      <g class="fist-left">
        <rect x="0" y="10" width="2" height="2"/>
      </g>
      <g class="fist-right">
        <rect x="13" y="10" width="2" height="2"/>
      </g>
    </g>
    <!-- Angry eyebrows -->
    <g fill="#000">
      <rect x="4" y="8" width="1" height="1"/>
      <rect x="5" y="9" width="2" height="1"/>
      <rect x="12" y="8" width="1" height="1"/>
      <rect x="10" y="9" width="2" height="1"/>
    </g>
    <!-- Angry eyes -->
    <g fill="#000">
      <rect x="5" y="11" width="1" height="2"/>
      <rect x="11" y="11" width="1" height="2"/>
    </g>
    <!-- Angry mouth -->
    <g fill="#000">
      <rect x="6" y="15" width="3" height="1"/>
      <rect x="5" y="14" width="1" height="1"/>
      <rect x="9" y="14" width="1" height="1"/>
    </g>
    <!-- Red tint on face -->
    <g fill="#CC4444" opacity="0.3">
      <rect x="3" y="12" width="2" height="2"/>
      <rect x="11" y="12" width="2" height="2"/>
    </g>
  </g>
</svg>
