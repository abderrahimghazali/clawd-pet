<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 22" width="120" height="147">
  <defs>
    <style>
      .happy-body {
        transform-origin: 7.5px 19px;
        animation: happy-jump 1s infinite ease-in-out;
      }
      .happy-shadow {
        transform-origin: 7.5px 19.5px;
        animation: shadow-squish 1s infinite ease-in-out;
      }
      .happy-eyes {
        animation: blink-happy 3s infinite;
      }
      .sparkle1 { animation: sparkle 1.2s infinite ease-in-out; }
      .sparkle2 { animation: sparkle 1.2s infinite ease-in-out 0.3s; }
      .sparkle3 { animation: sparkle 1.2s infinite ease-in-out 0.6s; }
      .wave-arm {
        transform-origin: 13px 10px;
        animation: wave 0.6s infinite alternate ease-in-out;
      }
      @keyframes happy-jump {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes shadow-squish {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(0.6); opacity: 0.2; }
      }
      @keyframes blink-happy {
        0%, 45%, 55%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes wave {
        0% { transform: rotate(-20deg); }
        100% { transform: rotate(-60deg); }
      }
    </style>
  </defs>
  <!-- Shadow -->
  <rect class="happy-shadow" x="3" y="19" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Sparkles -->
  <g fill="#FFD700">
    <rect class="sparkle1" x="0" y="2" width="1" height="1"/>
    <rect class="sparkle2" x="15" y="1" width="1" height="1"/>
    <rect class="sparkle3" x="14" y="6" width="1" height="1"/>
  </g>
  <!-- Body -->
  <g class="happy-body">
    <g fill="#DE886D">
      <!-- Legs -->
      <rect x="3" y="17" width="1" height="2"/>
      <rect x="5" y="17" width="1" height="2"/>
      <rect x="9" y="17" width="1" height="2"/>
      <rect x="11" y="17" width="1" height="2"/>
      <!-- Torso -->
      <rect x="2" y="8" width="11" height="9"/>
      <!-- Left arm -->
      <rect x="0" y="11" width="2" height="2"/>
      <!-- Right arm waving -->
      <g class="wave-arm">
        <rect x="13" y="10" width="2" height="2"/>
      </g>
    </g>
    <!-- Happy squint eyes -->
    <g class="happy-eyes" fill="#000">
      <rect x="4" y="10" width="1" height="1"/>
      <rect x="5" y="9" width="1" height="1"/>
      <rect x="6" y="10" width="1" height="1"/>
      <rect x="10" y="10" width="1" height="1"/>
      <rect x="11" y="9" width="1" height="1"/>
      <rect x="12" y="10" width="1" height="1"/>
    </g>
    <!-- Big smile -->
    <g fill="#000">
      <rect x="5" y="13" width="1" height="1"/>
      <rect x="6" y="14" width="3" height="1"/>
      <rect x="9" y="13" width="1" height="1"/>
    </g>
    <!-- Blush -->
    <g fill="#E8A090" opacity="0.7">
      <rect x="3" y="12" width="2" height="1"/>
      <rect x="11" y="12" width="2" height="1"/>
    </g>
  </g>
</svg>
