<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .thd-body { transform-origin: 7.5px 15px; animation: thd-shake 2s infinite ease-in-out; }
      .thd-shadow { animation: thd-s 2s infinite; }
      .thd-eyes { transform-origin: 7.5px 9px; animation: thd-blink 3s infinite; }
      @keyframes thd-shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-2deg); } 75% { transform: rotate(2deg); } }
      @keyframes thd-s { 0%, 100% { opacity: 0.5; } }
      @keyframes thd-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
    </style>
  </defs>
  <rect class="thd-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="thd-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <!-- Thumbs down hand -->
      <rect x="13" y="9" width="2" height="3"/>
      <rect x="14" y="12" width="2" height="3"/>
    </g>
    <g class="thd-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
